<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venha Conhecer - Prospés</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2796e1 0%, #3ba4eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.95);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }



    h1 {
      font-size: 36px;
      color: #1f2937;
      margin-bottom: 15px;
    }

    .subtitle {
      font-size: 20px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .message {
      font-size: 18px;
      color: #374151;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .countdown {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .countdown-item {
      background: #2796e1;
      color: white;
      padding: 20px;
      border-radius: 10px;
      min-width: 80px;
    }

    .countdown-item .number {
      font-size: 32px;
      font-weight: bold;
      display: block;
    }

    .countdown-item .label {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .contact {
      font-size: 16px;
      color: #6b7280;
    }

    .contact a {
      color: #2796e1;
      text-decoration: none;
      font-weight: bold;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .container {
        padding: 40px 30px;
      }

      .logo {
        font-size: 36px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 18px;
      }

      .countdown {
        gap: 10px;
      }

      .countdown-item {
        padding: 15px;
        min-width: 60px;
      }

      .countdown-item .number {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nosso Site Mudou!</h1>
    <p class="subtitle">Atendimento Especial e Personalizado</p>
    
    <p class="message">
      Agora as compras serão realizadas diretamente através de um<br>
      <strong>atendimento especial e personalizado para você.</strong><br><br>
      Estamos prontos para oferecer a melhor experiência!
    </p>

    <a href="https://prospes.com.br" style="display: inline-block; background: #2796e1; color: white; padding: 18px 40px; border-radius: 10px; text-decoration: none; font-size: 18px; font-weight: bold; margin: 30px 0; transition: all 0.3s;">
      Conhecer o Novo Site →
    </a>

    <div class="contact" style="margin-top: 40px;">
      Dúvidas? Entre em contato: <a href="mailto:contato@prospes.com.br">contato@prospes.com.br</a>
    </div>
  </div>
</body>
</html>
